name: Deploy Astro Site

on:
  push:
    branches:
      - gE
  workflow_dispatch:

env:
  NODE_VERSION: 22
  SSH_PORT: ${{ vars.SERVER_PORT || '22' }}
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/home/user533/lxc_blog_astro' }}
  PM2_APP_NAME: ${{ vars.PM2_APP_NAME || 'lxc_blog_astro' }}
  APP_PORT: ${{ vars.APP_PORT || '4321' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Setup pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          WALINE_SERVER_URL: ${{ secrets.WALINE_SERVER_URL || vars.WALINE_SERVER_URL }}
          PUBLIC_WALINE_SERVER_URL: ${{ secrets.PUBLIC_WALINE_SERVER_URL || vars.PUBLIC_WALINE_SERVER_URL }}
        run: pnpm build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ env.SSH_PORT }} -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Prepare remote directory
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ env.SSH_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "mkdir -p ${{ env.DEPLOY_PATH }}"

      - name: Upload build output
        run: |
          rsync -az --delete \
            --exclude='node_modules' \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ env.SSH_PORT }}" \
            dist/ package.json pnpm-lock.yaml ecosystem.config.cjs \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:${{ env.DEPLOY_PATH }}/

      - name: Write runtime env
        run: |
          {
            echo "HOST=0.0.0.0"
            echo "PORT=${{ env.APP_PORT }}"
            echo "WALINE_SERVER_URL=${{ secrets.WALINE_SERVER_URL || vars.WALINE_SERVER_URL }}"
            echo "PUBLIC_WALINE_SERVER_URL=${{ secrets.PUBLIC_WALINE_SERVER_URL || vars.PUBLIC_WALINE_SERVER_URL }}"
            echo "CODETIME_TOKEN=${{ secrets.CODETIME_TOKEN }}"
          } | ssh -i ~/.ssh/deploy_key -p ${{ env.SSH_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "cat > ${{ env.DEPLOY_PATH }}/.env"

      - name: Install and restart on server
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ env.SSH_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "export PM2_APP_NAME=${{ env.PM2_APP_NAME }}; export HOST=0.0.0.0; export PORT=${{ env.APP_PORT }}; source ~/.nvm/nvm.sh 2>/dev/null || true; corepack enable; cd ${{ env.DEPLOY_PATH }} && pnpm install --prod --frozen-lockfile && (pm2 delete ${{ env.PM2_APP_NAME }} 2>/dev/null || true) && pm2 start ecosystem.config.cjs && pm2 save"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
